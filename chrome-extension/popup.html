<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #0a0c14;
      --card: #111422;
      --border: #1f2438;
      --primary: #7f56d9;
      --primary-hover: #9e77ed;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --success: #10b981;
      --danger: #ef4444;
    }

    body {
      width: 320px;
      margin: 0;
      padding: 15px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
    }

    h3 {
      font-size: 1rem;
      margin-top: 0;
      margin-bottom: 12px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    .form-group {
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.85rem;
      transition: all 0.2s ease;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(127, 86, 217, 0.2);
    }

    textarea {
      resize: vertical;
      height: 60px;
    }

    .btn {
      display: block;
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background-color 0.2s ease;
      margin-top: 12px;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    #status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      font-size: 0.75rem;
      display: none;
      text-align: center;
    }

    .success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: var(--success);
    }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--danger);
    }
    
    .badge {
      display: inline-block;
      padding: 2px 6px;
      background: var(--border);
      border-radius: 4px;
      font-size: 0.7rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <h3>📟 eBay Multi-Lister Scraper</h3>
  
  <div class="form-group">
    <label for="title">Product Title</label>
    <input type="text" id="title" placeholder="Loading title...">
  </div>

  <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
    <div>
      <label for="price">Price ($)</label>
      <input type="number" id="price" step="0.01">
    </div>
    <div>
      <label for="brand">Brand</label>
      <input type="text" id="brand">
    </div>
  </div>

  <div class="form-group">
    <label for="description">Description</label>
    <textarea id="description" placeholder="Loading description..."></textarea>
  </div>

  <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
    <span class="badge" id="imageCount">Images Found: 0</span>
    <span class="badge" id="serverStatus">Local Server: Checking...</span>
  </div>

  <button class="btn" id="sendBtn">Save Draft to Dashboard</button>
  
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
